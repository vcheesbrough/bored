when:
  - event: [push, deployment]

steps:
  build:
    when:
      - event: push
    image: &docker-image docker:27-cli@sha256:f56779b4e86550493153cc8642c9c8e40b5d934e43cb5b4ea463aea5245c5c01
    volumes: &docker-socket
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker build -t registry.desync.link/bored:$$CI_COMMIT_SHA .

  e2e:
    when:
      - event: push
    image: *docker-image
    volumes: *docker-socket
    commands:
      - |
        REPORT=/srv/dev/playwright-reports/pipeline-$$CI_PIPELINE_NUMBER--$(echo $$CI_COMMIT_BRANCH | tr '/' '-')--$(echo $$CI_COMMIT_SHA | cut -c1-7)
        REPORT_DIR=$$REPORT TEST_IMAGE=registry.desync.link/bored:$$CI_COMMIT_SHA docker compose -f e2e/docker-compose.test.yml up --build --force-recreate --abort-on-container-exit --exit-code-from playwright && RC=0 || RC=$$?
        REPORT_DIR=$$REPORT TEST_IMAGE=registry.desync.link/bored:$$CI_COMMIT_SHA docker compose -f e2e/docker-compose.test.yml down --volumes
        echo "Test report: $$REPORT/index.html"
        exit $$RC

  validate-deployment:
    when:
      - event: deployment
    image: alpine:3.21@sha256:f27cad9117495d32d067133afff942cb2dc745dfe9163e949f6bfe8a6a245339
    commands:
      - |
        if [ "$$CI_PIPELINE_DEPLOY_TARGET" != "dev" ] && [ "$$CI_PIPELINE_DEPLOY_TARGET" != "prod" ]; then
          echo "ERROR: deploy target must be 'dev' or 'prod' (got: '$$CI_PIPELINE_DEPLOY_TARGET')"
          exit 1
        fi
      - |
        if [ "$$CI_PIPELINE_DEPLOY_TARGET" = "prod" ] && [ "$$CI_COMMIT_BRANCH" != "main" ]; then
          echo "ERROR: prod can only be deployed from main (current branch: '$$CI_COMMIT_BRANCH')"
          exit 1
        fi

  compute-version:
    when:
      - event: deployment
    image: &alpine-git alpine/git:latest@sha256:970dba879f3c60fd3d1286788fdc8107dceb541d8569e3f2b1745e8e5199664d
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)\.[0-9]*"/\1/')
      - PATCH=$(git ls-remote --tags --refs https://x-token:$$GITHUB_TOKEN@github.com/$$CI_REPO.git "refs/tags/v$$CARGO_VERSION.*" | wc -l | tr -d ' ')
      - echo "$$CARGO_VERSION.$$PATCH" > .version
      - echo "$$CARGO_VERSION.$$PATCH-$(echo $$CI_COMMIT_SHA | cut -c1-7)" > .version-dev
      - echo "Version $(cat .version), dev $(cat .version-dev)"

  apply-authentik-blueprint:
    when:
      - event: deployment
    pull: true
    image: ghcr.io/vcheesbrough/woodpecker-plugin-authentik-blueprint:v0.1.2
    settings:
      api_url: https://auth.desync.link
      api_token:
        from_secret: authentik_api_token
      file: authentik/blueprint.yaml
      instance_name: bored
      timeout_seconds: 900
      vars:
        AUTHENTIK_BORED_DEV_CLIENT_SECRET:
          from_secret: bored_dev_oidc_client_secret
        AUTHENTIK_BORED_PROD_CLIENT_SECRET:
          from_secret: bored_prod_oidc_client_secret
        AUTHENTIK_BORED_MCP_PROD_CLIENT_SECRET:
          from_secret: bored_mcp_prod_client_secret

  push:
    when:
      - event: deployment
    image: *docker-image
    volumes: *docker-socket
    environment: &registry-creds
      REGISTRY_USER:
        from_secret: zot_ci_user
      REGISTRY_PASSWORD:
        from_secret: zot_ci_password
    commands:
      - &docker-login echo "$$REGISTRY_PASSWORD" | docker login registry.desync.link -u "$$REGISTRY_USER" --password-stdin
      - docker build -t registry.desync.link/bored:$(cat .version) -t registry.desync.link/bored:$(cat .version-dev) .
      - docker push registry.desync.link/bored:$(cat .version)
      - docker push registry.desync.link/bored:$(cat .version-dev)

  tag-release:
    when:
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "prod"'
    image: *alpine-git
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - git tag v$(cat .version)
      - git push https://x-token:$$GITHUB_TOKEN@github.com/$$CI_REPO.git v$(cat .version)

  deploy-dev:
    when:
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "dev"'
    image: *docker-image
    volumes: *docker-socket
    environment:
      REGISTRY_USER:
        from_secret: zot_ci_user
      REGISTRY_PASSWORD:
        from_secret: zot_ci_password
      OIDC_CLIENT_SECRET:
        from_secret: bored_dev_oidc_client_secret
    commands:
      - *docker-login
      - docker volume create bored-dev-db
      - |
        BORED_IMAGE_TAG=$(cat .version-dev) APP_VERSION=$(cat .version-dev) \
        APP_ENV=$$CI_COMMIT_BRANCH BORED_HOST=bored-dev.desync.link \
        BORED_CONTAINER_NAME=bored-dev DB_VOLUME=bored-dev-db \
        OIDC_ISSUER_URL=https://auth.desync.link/application/o/bored-dev/ \
        OIDC_CLIENT_ID=bored-browser-dev \
        OIDC_CLIENT_SECRET=$$OIDC_CLIENT_SECRET \
        OIDC_REDIRECT_URI=https://bored-dev.desync.link/auth/callback \
        REQUIRED_SCOPE=bored:dev:access \
        OIDC_END_SESSION_URL=https://auth.desync.link/application/o/bored-dev/end-session/ \
        docker compose -p bored-dev -f deploy/docker-compose.yml up -d --pull always

  deploy-prod:
    when:
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "prod"'
    image: *docker-image
    volumes: *docker-socket
    environment:
      REGISTRY_USER:
        from_secret: zot_ci_user
      REGISTRY_PASSWORD:
        from_secret: zot_ci_password
      OIDC_CLIENT_SECRET:
        from_secret: bored_prod_oidc_client_secret
    commands:
      - *docker-login
      - docker volume create bored-prod-db
      - |
        BORED_IMAGE_TAG=$(cat .version) APP_VERSION=$(cat .version) \
        APP_ENV=production BORED_HOST=bored.desync.link \
        BORED_CONTAINER_NAME=bored DB_VOLUME=bored-prod-db \
        OIDC_ISSUER_URL=https://auth.desync.link/application/o/bored-prod/ \
        OIDC_CLIENT_ID=bored-browser-prod \
        OIDC_CLIENT_SECRET=$$OIDC_CLIENT_SECRET \
        OIDC_REDIRECT_URI=https://bored.desync.link/auth/callback \
        REQUIRED_SCOPE=bored:prod:access \
        OIDC_END_SESSION_URL=https://auth.desync.link/application/o/bored-prod/end-session/ \
        OIDC_MCP_ISSUER_URL=https://auth.desync.link/application/o/bored-mcp/ \
        OIDC_MCP_CLIENT_ID=bored-mcp-prod \
        docker compose -p bored -f deploy/docker-compose.yml up -d --pull always
