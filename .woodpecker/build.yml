when:
  - event: [push, manual]

steps:
  check:
    image: rust:1.85
    commands:
      - rustup component add rustfmt clippy
      - cargo fmt -p backend -p shared --check
      - cargo clippy -p backend -p shared -- -D warnings
      - cargo test -p backend -p shared

  build-and-push:
    when:
      - event: [push, manual]
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      REGISTRY_USER:
        from_secret: zot_ci_user
      REGISTRY_PASSWORD:
        from_secret: zot_ci_password
    commands:
      - |
        echo "$$REGISTRY_PASSWORD" | docker login registry.desync.link -u "$$REGISTRY_USER" --password-stdin
        CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)\.[0-9]*"/\1/')
        VERSION=$$CARGO_VERSION.$$CI_PIPELINE_NUMBER
        docker buildx build --push \
          -t registry.desync.link/bored:$$CI_COMMIT_SHA \
          -t registry.desync.link/bored:$$VERSION \
          -t registry.desync.link/bored:$$VERSION .

  tag-release:
    when:
      - event: [push, manual]
    image: alpine/git
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)\.[0-9]*"/\1/')
        VERSION=$$CARGO_VERSION.$$CI_PIPELINE_NUMBER
        git tag v$$VERSION
        git push https://x-token:$$GITHUB_TOKEN@github.com/$$CI_REPO.git v$$VERSION

  deploy:
    when:
      - event: [push, manual]
    image: alpine
    environment:
      MINI_SSH_KEY:
        from_secret: mini_ssh_key
    # StrictHostKeyChecking is fine here, it is not practical to add the server's host key to the image and this is a private network
    commands:
      - |
        apk add -q openssh-client
        mkdir -p ~/.ssh
        echo "$$MINI_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)\.[0-9]*"/\1/')
        VERSION=$$CARGO_VERSION.$$CI_PIPELINE_NUMBER
        SSH_OPTS="-i ~/.ssh/id_rsa -o StrictHostKeyChecking=no"
        ssh $$SSH_OPTS vincent@10.0.0.29 "mkdir -p /srv/dev/mini-config/bored-stack"
        scp $$SSH_OPTS deploy/docker-compose.yml vincent@10.0.0.29:/srv/dev/mini-config/bored-stack/docker-compose.yml
        ssh $$SSH_OPTS vincent@10.0.0.29 "cd /srv/dev/mini-config && BORED_VERSION=$$VERSION ./run-stack.sh bored-stack up -d --pull always"
