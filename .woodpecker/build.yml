when:
  - event: [push, deployment]

steps:
  check:
    when:
      - event: push
    image: rust:1.94.1@sha256:652612f07bfbbdfa3af34761c1e435094c00dde4a98036132fca28c7bb2b165c
    commands:
      - rustup component add rustfmt clippy llvm-tools-preview
      - cargo install cargo-llvm-cov --locked
      - cargo fmt -p backend -p shared --check
      - cargo clippy -p backend -p shared -- -D warnings
      - cargo llvm-cov -p backend -p shared --text

  build:
    when:
      - event: push
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker build -t registry.desync.link/bored:$$CI_COMMIT_SHA .

  push:
    when:
      - event: deployment
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      REGISTRY_USER:
        from_secret: zot_ci_user
      REGISTRY_PASSWORD:
        from_secret: zot_ci_password
    commands:
      - |
        echo "$$REGISTRY_PASSWORD" | docker login registry.desync.link -u "$$REGISTRY_USER" --password-stdin
        docker build -t registry.desync.link/bored:$$BORED_VERSION .
        docker push registry.desync.link/bored:$$BORED_VERSION

  tag-release:
    when:
      - event: deployment
    image: alpine/git
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        git tag v$$BORED_VERSION
        git push https://x-token:$$GITHUB_TOKEN@github.com/$$CI_REPO.git v$$BORED_VERSION

  deploy-dev:
    when:
      - event: deployment
        environment: dev
    image: alpine
    environment:
      MINI_SSH_KEY:
        from_secret: mini_ssh_key
    commands:
      - |
        apk add -q openssh-client
        mkdir -p ~/.ssh
        echo "$$MINI_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        SSH_OPTS="-i ~/.ssh/id_rsa -o StrictHostKeyChecking=no"
        ssh $$SSH_OPTS vincent@10.0.0.29 "mkdir -p /opt/bored"
        scp $$SSH_OPTS deploy/docker-compose.yml vincent@10.0.0.29:/opt/bored/docker-compose.yml
        ssh $$SSH_OPTS vincent@10.0.0.29 " \
          BORED_IMAGE_TAG=$$BORED_VERSION \
          APP_ENV=$$CI_COMMIT_BRANCH \
          BORED_HOST=bored-dev.desync.link \
          DB_VOLUME=bored-dev-db \
          docker compose -f /opt/bored/docker-compose.yml up -d --pull always"

  deploy-prod:
    when:
      - event: deployment
        environment: prod
    image: alpine
    environment:
      MINI_SSH_KEY:
        from_secret: mini_ssh_key
    commands:
      - |
        apk add -q openssh-client
        mkdir -p ~/.ssh
        echo "$$MINI_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        SSH_OPTS="-i ~/.ssh/id_rsa -o StrictHostKeyChecking=no"
        ssh $$SSH_OPTS vincent@10.0.0.29 "mkdir -p /opt/bored"
        scp $$SSH_OPTS deploy/docker-compose.yml vincent@10.0.0.29:/opt/bored/docker-compose.yml
        ssh $$SSH_OPTS vincent@10.0.0.29 " \
          BORED_IMAGE_TAG=$$BORED_VERSION \
          APP_ENV=production \
          BORED_HOST=bored.desync.link \
          DB_VOLUME=bored-prod-db \
          DB_VOLUME_EXTERNAL=true \
          docker compose -f /opt/bored/docker-compose.yml up -d --pull always"
