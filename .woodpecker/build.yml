when:
  - event: [push, deployment]

steps:
  build:
    when:
      - event: push
    image: &docker-image docker:27-cli
    volumes: &docker-socket
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker build -t registry.desync.link/bored:$$CI_COMMIT_SHA .

  validate-deployment:
    when:
      - event: deployment
    image: alpine
    commands:
      - |
        if [ "$$CI_PIPELINE_DEPLOY_TARGET" != "dev" ] && [ "$$CI_PIPELINE_DEPLOY_TARGET" != "prod" ]; then
          echo "ERROR: deploy target must be 'dev' or 'prod' (got: '$$CI_PIPELINE_DEPLOY_TARGET')"
          exit 1
        fi
      - |
        if [ "$$CI_PIPELINE_DEPLOY_TARGET" = "prod" ] && [ "$$CI_COMMIT_BRANCH" != "main" ]; then
          echo "ERROR: prod can only be deployed from main (current branch: '$$CI_COMMIT_BRANCH')"
          exit 1
        fi

  push:
    when:
      - event: deployment
    image: *docker-image
    volumes: *docker-socket
    environment: &registry-creds
      REGISTRY_USER:
        from_secret: zot_ci_user
      REGISTRY_PASSWORD:
        from_secret: zot_ci_password
    commands:
      - &compute-version CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)\.[0-9]*"/\1/') && VERSION=$$CARGO_VERSION.$$CI_PIPELINE_PARENT
      - &docker-login echo "$$REGISTRY_PASSWORD" | docker login registry.desync.link -u "$$REGISTRY_USER" --password-stdin
      - docker build -t registry.desync.link/bored:$$VERSION .
      - docker push registry.desync.link/bored:$$VERSION

  tag-release:
    when:
      - event: deployment
    image: alpine/git
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - *compute-version
      - git tag v$$VERSION
      - git push https://x-token:$$GITHUB_TOKEN@github.com/$$CI_REPO.git v$$VERSION

  deploy-dev:
    when:
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "dev"'
    image: *docker-image
    volumes: *docker-socket
    environment: *registry-creds
    commands:
      - *compute-version
      - *docker-login
      - docker volume create bored-dev-db
      - BORED_IMAGE_TAG=$$VERSION APP_ENV=$$CI_COMMIT_BRANCH BORED_HOST=bored-dev.desync.link BORED_CONTAINER_NAME=bored-dev DB_VOLUME=bored-dev-db docker compose -p bored-dev -f deploy/docker-compose.yml up -d --pull always

  deploy-prod:
    when:
      - event: deployment
        evaluate: 'CI_PIPELINE_DEPLOY_TARGET == "prod"'
    image: *docker-image
    volumes: *docker-socket
    environment: *registry-creds
    commands:
      - *compute-version
      - *docker-login
      - docker volume create bored-prod-db
      - BORED_IMAGE_TAG=$$VERSION APP_ENV=production BORED_HOST=bored.desync.link BORED_CONTAINER_NAME=bored DB_VOLUME=bored-prod-db docker compose -p bored -f deploy/docker-compose.yml up -d --pull always
