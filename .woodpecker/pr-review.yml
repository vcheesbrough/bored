# Automated PR review agent.
# See https://github.com/vcheesbrough/claude-pr-agent for details.

when:
  - event: pull_request

steps:
  review:
    image: registry.desync.link/claude-pr-agent:8df05c7
    pull: true
    environment:
      ANTHROPIC_API_KEY:
        from_secret: anthropic_api_key
      PR_REVIEWER_GH_APP_ID:
        from_secret: pr_reviewer_gh_app_id
      PR_REVIEWER_GH_APP_INSTALLATION_ID:
        from_secret: pr_reviewer_gh_app_installation_id
      PR_REVIEWER_GH_APP_PRIVATE_KEY_B64:
        from_secret: pr_reviewer_gh_app_private_key_b64
