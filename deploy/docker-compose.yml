services:
  bored:
    image: registry.desync.link/bored:${BORED_IMAGE_TAG:?BORED_IMAGE_TAG is required}
    container_name: ${BORED_CONTAINER_NAME:?BORED_CONTAINER_NAME is required}
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:?APP_ENV is required}
      - LOG_LEVEL=info
      - LOKI_URL=http://monitor-loki:3100
      - DATABASE_PATH=/data/bored.db
    volumes:
      - bored-db:/data
    networks:
      - proxy-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.${BORED_CONTAINER_NAME}.entrypoints=websecure
      - traefik.http.routers.${BORED_CONTAINER_NAME}.rule=Host(`${BORED_HOST:?BORED_HOST is required}`)
      - traefik.http.routers.${BORED_CONTAINER_NAME}.tls=true
      - traefik.http.routers.${BORED_CONTAINER_NAME}.tls.certresolver=myresolver
      - traefik.http.services.${BORED_CONTAINER_NAME}.loadbalancer.server.port=443
      - traefik.http.services.${BORED_CONTAINER_NAME}.loadbalancer.server.scheme=https

volumes:
  bored-db:
    name: ${DB_VOLUME:?DB_VOLUME is required}
    external: true

networks:
  proxy-backend:
    external: true
