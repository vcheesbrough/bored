services:
  bored:
    image: registry.desync.link/bored:${BORED_VERSION:?BORED_VERSION is required}
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - LOG_LEVEL=info
      - LOKI_URL=http://monitor-loki:3100
    networks:
      - proxy-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.bored.entrypoints=websecure
      - traefik.http.routers.bored.rule=Host(`bored.desync.link`)
      - traefik.http.routers.bored.tls=true
      - traefik.http.routers.bored.tls.certresolver=myresolver
      - traefik.http.services.bored.loadbalancer.server.port=443
      - traefik.http.services.bored.loadbalancer.server.scheme=https
      - traefik.http.services.bored.loadbalancer.serversTransport=insecure@internal

networks:
  proxy-backend:
    external: true
