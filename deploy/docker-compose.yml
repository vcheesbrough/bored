services:
  bored:
    image: registry.desync.link/bored:${BORED_IMAGE_TAG:?BORED_IMAGE_TAG is required}
    container_name: bored
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:?APP_ENV is required}
      - LOG_LEVEL=info
      - LOKI_URL=http://monitor-loki:3100
      - DATABASE_PATH=/data/bored.db
    volumes:
      - bored-db:/data
    networks:
      - proxy-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.bored.entrypoints=websecure
      - traefik.http.routers.bored.rule=Host(`${BORED_HOST:?BORED_HOST is required}`)
      - traefik.http.routers.bored.tls=true
      - traefik.http.routers.bored.tls.certresolver=myresolver
      - traefik.http.services.bored.loadbalancer.server.port=443
      - traefik.http.services.bored.loadbalancer.server.scheme=https

volumes:
  bored-db:
    name: ${DB_VOLUME:?DB_VOLUME is required}
    external: ${DB_VOLUME_EXTERNAL:-false}

networks:
  proxy-backend:
    external: true
